name: phs_lint

on:
  workflow_call:
    inputs:
      changed_files_only:
        description: 'Only lint files changed in the pull request (default: true)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  lint:
    name: MegaLinter Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run MegaLinter
        uses: oxsecurity/megalinter@ef3e84b8b836d76db562d0f3ed7da61e8fd538bc # v9.6.0
        env:
          VALIDATE_ALL_CODEBASE: ${{ !inputs.changed_files_only || github.event_name != 'pull_request' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
