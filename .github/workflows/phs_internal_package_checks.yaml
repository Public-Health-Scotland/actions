name: phs_internal_package_checks

on:
  workflow_call:
    inputs:
      limit_parallel:
        required: false
        type: boolean
        default: false
        description: "Limit concurrent jobs in general and specifically limit R-CMD-check to 3 in parallel (default: false)"
      run_tests:
        description: 'Run unit tests and trigger code coverage'
        required: false
        type: boolean
        default: false
    secrets:
      PHS_ACTIONS_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: read
  statuses: read
  packages: read

concurrency:
  group: ${{ format('phs-package-checks-{0}-{1}', github.repository, github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

jobs:
  Style_and_document:
    uses: ./.github/workflows/phs_style_and_document.yaml
    permissions:
      contents: write
      pull-requests: write
      packages: read
    secrets: inherit
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
      
  R-CMD-check-core:
    needs: [Style_and_document]
    uses: ./.github/workflows/phs_R-CMD-check-core.yaml
    permissions:
      contents: read
      packages: read
    with:
      args: ${{ inputs.run_tests && 'c("--no-manual", "--no-vignettes")' || 'c("--no-manual", "--no-vignettes", "--no-tests")' }}
    secrets: inherit
    concurrency:
      group: ${{ inputs.limit_parallel == false && format('r-cmd-check-{0}-{1}', github.workflow, github.run_id) || 'phs-core-check-queue' }}
      cancel-in-progress: false

  test-coverage:
    needs: [R-CMD-check-core]
    if: ${{ inputs.run_tests }}
    uses: ./.github/workflows/phs_test_coverage.yaml
    permissions:
      contents: read
      packages: read
    secrets: inherit
    concurrency:
      group: ${{ inputs.limit_parallel == false && format('test-coverage-{0}-{1}', github.workflow, github.run_id) || 'package-checks-queue' }}
      cancel-in-progress: false

  pkgdown:
    needs:
      - Style_and_document
      - R-CMD-check-core
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref_name == 'main' || github.ref_name == 'master') }}
    uses: ./.github/workflows/phs_pkgdown.yaml
    permissions:
      contents: write
      packages: read
    secrets: inherit
