# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  workflow_call:
    secrets:
      PHS_ACTIONS_TOKEN:
        required: false

name: phs_document.yaml

permissions:
  contents: read
  pull-requests: read
  packages: read

jobs:
  phs_document:
    name: "Automatically re-build the package documentation"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/public-health-scotland/phs-r-image

    env:
      GITHUB_PAT: ${{ secrets.PHS_ACTIONS_TOKEN || github.token }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Mark workspace as safe for Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          token: ${{ secrets.PHS_ACTIONS_TOKEN || github.token }}

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2.12.0

      - name: Normalise DESCRIPTION
        run: desc::desc_normalize()
        shell: Rscript {0}

      - name: Document package
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - name: Commit and push changes
        id: commit_step_document
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "Document package (GHA)"
          commit_user_name: ${{ github.actor }}
          commit_user_email: ${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com
        continue-on-error: true

      - name: Create Pull Request
        if: ${{ steps.commit_step_document.outputs.changes_detected == 'true' && steps.commit_step_document.outcome == 'failure' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.PHS_ACTIONS_TOKEN || github.token }}
          commit-message: "Document package (GHA)"
          branch: auto-document-code
          delete-branch: true
          title: "Document package (GHA)"
          labels: maintenance
          base: ${{ github.event.pull_request.base.ref }}
          body: |
            This Pull Request was automatically created to apply documentation changes to your code.
            Please review and merge this PR.
          assignees: ${{ github.actor }}
          reviewers: ${{ github.actor }}
