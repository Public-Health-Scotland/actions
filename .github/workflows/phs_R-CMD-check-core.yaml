on:
  workflow_call:

name: R-CMD-check-core.yaml

permissions:
  contents: read
  packages: read

jobs:
  R-CMD-check-linux:
    name: Core R-CMD-check – ubuntu-latest (${{ matrix.r }})
    runs-on: ubuntu-latest
    # Run the job inside a Rocker image
    container:
      image: ${{ (matrix.r == 'release' && 'ghcr.io/public-health-scotland/phs-r-image') || format('rocker/r-ver:{0}', matrix.r) }}

    strategy:
      fail-fast: false
      matrix:
        # Just add versions here; mapping happens above
        r:
          - release   # current CRAN release
          - '4.4.2'   # Posit Workbench baseline
          - '4.5.1'   # Posit Workbench baseline

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Install git and qpdf
        if: matrix.r != 'release'
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends git qpdf
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2.12.0
        if: matrix.r != 'release'
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - name: Run R-CMD-check
        uses: r-lib/actions/check-r-package@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
